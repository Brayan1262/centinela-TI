<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Centinela TI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Fondo Animado de Burbujas -->
    <div class="bubbles">
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <span class="shield-icon">🛡️</span>
                <h1>CENTINELA TI</h1>
                <p>Nivel de Acceso Requerido</p>
            </div>
            
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Identificación</label>
                    <input type="text" id="username" placeholder="Ingresa tu usuario" required autocomplete="username">
                </div>
                
                <div class="input-group">
                    <label for="password">Código de Seguridad</label>
                    <input type="password" id="password" placeholder="Ingresa tu contraseña" required autocomplete="current-password">
                </div>

                <div id="errorMessage" class="error-message"></div>

                <button type="submit" class="login-btn">AUTENTICAR SISTEMA</button>
            </form>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
