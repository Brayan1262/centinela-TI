version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: centinela_db
    environment:
      POSTGRES_DB: centinela_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
